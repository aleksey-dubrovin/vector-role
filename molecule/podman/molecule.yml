---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: ubuntu-py
    image: pycontribs/ubuntu:latest
    pre_build_image: true
    privileged: true
    ansible_user: root
provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
verifier:
  name: ansible