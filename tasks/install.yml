---
- name: "Обновление системы"
  ansible.builtin.package:
    name: "*"
    state: latest
    update_cache: true
  become: true
  tags: [vector, update]

- name: "Установка необходимых пакетов"
  ansible.builtin.package:
    name:
      - curl
      - wget
      - python3
      - python3-pip
    state: present
    update_cache: true
  become: true
  tags: [vector, packages]

- name: "Установка специфичных пакетов (RedHat)"
  ansible.builtin.package:
    name:
      - python3-libselinux
      - policycoreutils-python-utils
    state: present
  become: true
  tags: [vector, packages]
  when: ansible_os_family == "RedHat"

- name: "Установка специфичных пакетов (Ubuntu)"
  ansible.builtin.package:
    name: python3-venv
    state: present
  become: true
  tags: [vector, packages]
  when: ansible_os_family == "Debian"

- name: "Проверка существования RPM файла"
  ansible.builtin.stat:
    path: "/tmp/vector-{{ vector_version }}-1.x86_64.rpm"
  register: rpm_file
  when: ansible_os_family == "RedHat"

- name: "Скачивание Vector (RedHat)"
  ansible.builtin.get_url:
    url: "https://packages.timber.io/vector/{{ vector_version }}/vector-{{ vector_version }}-1.x86_64.rpm"
    dest: "/tmp/vector-{{ vector_version }}-1.x86_64.rpm"
    mode: '0644'
    validate_certs: true
    timeout: 60
  register: download_result
  until: download_result is success
  retries: 5
  delay: 10
  become: true
  tags: [vector, download]
  when: ansible_os_family == "RedHat" and not rpm_file.stat.exists

- name: "Проверка существования DEB файла"
  ansible.builtin.stat:
    path: "/tmp/vector_{{ vector_version }}-1_amd64.deb"
  register: deb_file
  when: ansible_os_family == "Debian"

- name: "Скачивание Vector (Ubuntu)"
  ansible.builtin.get_url:
    url: "https://packages.timber.io/vector/{{ vector_version }}/vector_{{ vector_version }}-1_amd64.deb"
    dest: "/tmp/vector_{{ vector_version }}-1_amd64.deb"
    mode: '0644'
    validate_certs: true
    timeout: 60
  register: download_result
  until: download_result is success
  retries: 5
  delay: 10
  become: true
  tags: [vector, download]
  when: ansible_os_family == "Debian" and not deb_file.stat.exists

- name: "Установка Vector (Ubuntu)"
  ansible.builtin.apt:
    deb: "/tmp/vector_{{ vector_version }}-1_amd64.deb"
    state: present
  become: true
  tags: [vector, install]
  when: ansible_os_family == "Debian"

- name: "Установка Vector (RedHat)"
  ansible.builtin.dnf:
    name: "/tmp/vector-{{ vector_version }}-1.x86_64.rpm"
    state: present
    disable_gpg_check: true
  become: true
  tags: [vector, install]
  when: ansible_os_family == "RedHat"

- name: "Создание пользователя vector"
  ansible.builtin.user:
    name: "{{ vector_user }}"
    system: true
    shell: /sbin/nologin
    create_home: false
  become: true
  tags: [vector, user]

- name: "Создание директорий Vector"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vector_user }}"
    group: "{{ vector_group }}"
    mode: '0755'
  loop:
    - "{{ vector_data_dir }}"
    - "/etc/vector"
  become: true
  tags: [vector, directories]

- name: "Настройка прав на логи (RedHat)"
  ansible.builtin.file:
    path: "{{ item }}"
    mode: '0640'
    owner: root
    group: adm
  loop:
    - /var/log/messages
    - /var/log/secure
  ignore_errors: true
  become: true
  tags: [vector, permissions]
  when: ansible_os_family == "RedHat"
