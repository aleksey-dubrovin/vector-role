---
- name: "Обновление системы (RedHat)"
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true
  become: true
  tags: [vector, update]
  when: ansible_os_family == "RedHat"

- name: "Обновление системы (Ubuntu)"
  ansible.builtin.apt:
    name: "*"
    state: latest
    update_cache: true
  become: true
  tags: [vector, update]
  when: ansible_os_family == "Debian"

- name: "Установка необходимых пакетов (RedHat)"
  ansible.builtin.dnf:
    name:
      - curl
      - wget
      - python3
      - python3-pip
      - python3-libselinux
      - policycoreutils-python-utils
    state: present
    update_cache: true
  become: true
  tags: [vector, packages]
  when: ansible_os_family == "RedHat"

- name: "Установка необходимых пакетов (Ubuntu)"
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - python3
      - python3-pip
      - python3-venv
    state: present
    update_cache: true
  become: true
  tags: [vector, packages]
  when: ansible_os_family == "Debian"

- name: "Скачивание Vector (RedHat) - GitHub Releases"
  ansible.builtin.get_url:
    url: "https://github.com/vectordotdev/vector/releases/download/v{{ vector_version }}/vector-{{ vector_version }}-1.x86_64.rpm"
    dest: "/tmp/vector-{{ vector_version }}-1.x86_64.rpm"
    mode: '0644'
    validate_certs: true
    timeout: 60
  register: download_result
  until: download_result is success
  retries: 5
  delay: 10
  become: true
  tags: [vector, download]
  when: ansible_os_family == "RedHat"

- name: "Скачивание Vector (Ubuntu) - GitHub Releases"
  ansible.builtin.get_url:
    url: "https://github.com/vectordotdev/vector/releases/download/v{{ vector_version }}/vector-{{ vector_version }}-amd64.deb"
    dest: "/tmp/vector-{{ vector_version }}-amd64.deb"
    mode: '0644'
    validate_certs: true
    timeout: 60
  register: download_result
  until: download_result is success
  retries: 5
  delay: 10
  become: true
  tags: [vector, download]
  when: ansible_os_family == "Debian"

- name: "Установка Vector (RedHat)"
  ansible.builtin.dnf:
    name: "/tmp/vector-{{ vector_version }}-1.x86_64.rpm"
    state: present
    disable_gpg_check: true
  become: true
  tags: [vector, install]
  when: ansible_os_family == "RedHat"

- name: "Установка Vector (Ubuntu)"
  ansible.builtin.apt:
    deb: "/tmp/vector-{{ vector_version }}-amd64.deb"
    state: present
  become: true
  tags: [vector, install]
  when: ansible_os_family == "Debian"

- name: "Создание пользователя vector"
  ansible.builtin.user:
    name: "{{ vector_user }}"
    system: true
    shell: /sbin/nologin
    create_home: false
  become: true
  tags: [vector, user]

- name: "Добавление пользователя vector в группу adm"
  ansible.builtin.user:
    name: "{{ vector_user }}"
    groups: adm
    append: true
  become: true
  tags: [vector, permissions]

- name: "Создание директорий Vector"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vector_user }}"
    group: "{{ vector_group }}"
    mode: '0755'
  loop:
    - "{{ vector_data_dir }}"
    - "/etc/vector"
  become: true
  tags: [vector, directories]

- name: "Очистка временного файла (RedHat)"
  ansible.builtin.file:
    path: "/tmp/vector-{{ vector_version }}-1.x86_64.rpm"
    state: absent
  become: true
  tags: [vector, cleanup]
  when: ansible_os_family == "RedHat"

- name: "Очистка временного файла (Ubuntu)"
  ansible.builtin.file:
    path: "/tmp/vector-{{ vector_version }}-amd64.deb"
    state: absent
  become: true
  tags: [vector, cleanup]
  when: ansible_os_family == "Debian"